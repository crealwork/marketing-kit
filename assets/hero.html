<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:400px;overflow:hidden}
  body{
    font-family:"Pretendard Variable",Pretendard,sans-serif;
    background:#FBF8F1 url('hero_band.png') center/cover no-repeat;
    color:#14212B;position:relative;
  }
  .veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(251,248,241,.92) 0%,rgba(251,248,241,.78) 46%,rgba(251,248,241,.18) 100%)}
  .inner{position:absolute;inset:0;padding:64px 72px;display:flex;flex-direction:column;justify-content:center}
  .kicker{display:flex;align-items:center;gap:12px}
  .kicker .dot{width:10px;height:10px;border-radius:50%;background:#E8756A}
  .kicker span{font-weight:700;font-size:15px;letter-spacing:.3em;color:rgba(20,33,43,.6)}
  h1{margin-top:14px;font-weight:800;font-size:72px;letter-spacing:-0.02em;line-height:1}
  h1 .accent{color:#E8756A}
  .tag{margin-top:18px;font-weight:500;font-size:24px;color:rgba(20,33,43,.72);letter-spacing:-0.01em}
  .badges{margin-top:26px;display:flex;gap:10px}
  .badge{font-weight:700;font-size:14px;letter-spacing:.06em;padding:7px 14px;border:1.5px solid rgba(20,33,43,.25);border-radius:999px;color:rgba(20,33,43,.75)}
  .badge.fill{background:#14212B;color:#F6F1E7;border-color:#14212B}
</style>
</head>
<body>
  <div class="veil"></div>
  <div class="inner">
    <div class="kicker"><div class="dot"></div><span>SUNDAYABLE</span></div>
    <h1>AI + Marketing <span class="accent">Kit</span></h1>
    <div class="tag">24 battle-tested marketing skills for AI agents</div>
    <div class="badges">
      <div class="badge fill">Claude Code plugin</div>
      <div class="badge">SEO/GEO · Ads · Email · Video · Design</div>
      <div class="badge">MIT</div>
    </div>
  </div>
</body>
</html>
